# Best overall TREC recipe: -l encoder + TF-IDF channel (also the evolution baseline,
# so hypotheses are pruned by marginal value over it) + longer evolution. 0.964 (seed 7).
run_name: trec_best_l_max
seed: 7
data:
  name: trec
encoder:
  model: dleemiller/finecat-nli-l
pool:
  size: 64
  rounds: 10
  patience: 4
lexical:
  kind: tfidf_svd
  dims: 128
